name: kato
image: ghcr.io/liutianjie/kato:latest
region: home
node: lab
exposure: tailscale-relay
domain: kato.itool.tech
port: 4173
publishPort: 14173
replicas: 1

env:
  NODE_ENV: production
  PORT: "4173"
  XHS_SERVICE_PORT: "18060"
  BROWSER_RUNTIME_PORT: "18100"
  BROWSER_RUNTIME_URL: http://127.0.0.1:18100
  XHS_BROWSER_RUNTIME_URL: http://127.0.0.1:18100
  XHS_API_TOKEN: ${XHS_API_TOKEN}
  COMMENT_PROVIDER: ark
  ARK_API_KEY: ${ARK_API_KEY}
  ARK_MODEL: ${ARK_MODEL}
  ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
  COMMENT_GENERATION_CONCURRENCY: "3"
  GENERATE_PUBLISH_CONCURRENCY: "3"
  BROWSER_BIN: /usr/local/bin/kato-chromium
  BROWSER_CDP_HOST: 127.0.0.1
  BROWSER_CDP_PORT: "9224"
  BROWSER_DISPLAY: ":99"
  BROWSER_VNC_ENABLED: "1"
  BROWSER_VNC_PORT: "5900"
  BROWSER_NOVNC_PORT: "6080"
  BROWSER_PROFILE_DIR: /app/mcp/xiaohongshu/data/profile
  BROWSER_COOKIES_PATH: /app/mcp/xiaohongshu/data/cookies.json
  BROWSER_COOKIE_MIRROR_PATHS: /app/data/cookies.json
  XHS_BROWSER_BIN: /usr/local/bin/kato-chromium
  XHS_CDP_HOST: 127.0.0.1
  XHS_CDP_PORT: "9224"
  XHS_INTERNAL_CDP_PORT: "9224"
  XHS_DISPLAY: ":99"
  XHS_VNC_ENABLED: "1"
  XHS_VNC_PORT: "5900"
  XHS_NOVNC_PORT: "6080"
  XHS_REST_TIMEOUT_MS: "600000"
  XHS_PUBLIC_MCP_FETCH_TIMEOUT_MS: "600000"
  XHS_CDP_CONNECT_TIMEOUT_MS: "30000"
  XHS_CDP_CONNECT_ATTEMPTS: "3"
  XHS_BROWSER_RESTART_TIMEOUT_MS: "120000"
  XHS_HEALTH_ENSURE_TIMEOUT_MS: "20000"
  XHS_BROWSER_TASK_TIMEOUT_MS: "180000"
  XHS_PROFILE_DIR: /app/mcp/xiaohongshu/data/profile
  COOKIES_PATH: /app/mcp/xiaohongshu/data/cookies.json
  LANG: zh_CN.UTF-8
  LC_ALL: zh_CN.UTF-8
  LANGUAGE: zh_CN:zh

volumes:
  - kato-data:/app/data
  - kato-output:/app/output
  - kato-xhs-data:/app/mcp/xiaohongshu/data
  - kato-xhs-images:/app/mcp/xiaohongshu/images

healthcheck:
  test:
    - CMD-SHELL
    - node -e "const urls=['http://127.0.0.1:4173/api/dashboard','http://127.0.0.1:18060/health?ensure=1','http://127.0.0.1:18100/health?ensure=1']; Promise.all(urls.map((url)=>fetch(url,{signal:AbortSignal.timeout(20000)}).then((r)=>{if(!r.ok) throw new Error(url+' '+r.status)}))).then(()=>process.exit(0)).catch((e)=>{console.error(e.message);process.exit(1)})"
  interval: 30s
  timeout: 25s
  retries: 3
  start_period: 60s

resources:
  limits:
    cpus: "2.00"
    memory: 4G
  reservations:
    cpus: "1.00"
    memory: 4G
