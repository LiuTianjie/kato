name: kato
image: ghcr.io/liutianjie/kato:latest
region: home
node: lab
exposure: tailscale-relay
domain: kato.itool.tech
port: 4173
publishPort: 14173
replicas: 1

env:
  NODE_ENV: production
  PORT: "4173"
  XHS_SERVICE_PORT: "18060"
  XHS_API_TOKEN: ${XHS_API_TOKEN}
  COMMENT_PROVIDER: ark
  ARK_API_KEY: ${ARK_API_KEY}
  ARK_MODEL: ${ARK_MODEL}
  ARK_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
  COMMENT_GENERATION_CONCURRENCY: "3"
  GENERATE_PUBLISH_CONCURRENCY: "3"
  XHS_BROWSER_BIN: /usr/local/bin/kato-chromium
  XHS_CDP_HOST: 0.0.0.0
  XHS_CDP_PORT: "9222"
  XHS_INTERNAL_CDP_PORT: "9224"
  XHS_PROFILE_DIR: /app/mcp/xiaohongshu/data/profile
  COOKIES_PATH: /app/mcp/xiaohongshu/data/cookies.json
  LANG: zh_CN.UTF-8
  LC_ALL: zh_CN.UTF-8
  LANGUAGE: zh_CN:zh

volumes:
  - kato-data:/app/data
  - kato-output:/app/output
  - kato-xhs-data:/app/mcp/xiaohongshu/data
  - kato-xhs-images:/app/mcp/xiaohongshu/images

healthcheck:
  test:
    - CMD-SHELL
    - node -e "const urls=['http://127.0.0.1:4173/api/dashboard','http://127.0.0.1:18060/health']; Promise.all(urls.map((url)=>fetch(url,{signal:AbortSignal.timeout(4000)}).then((r)=>{if(!r.ok) throw new Error(url+' '+r.status)}))).then(()=>process.exit(0)).catch((e)=>{console.error(e.message);process.exit(1)})"
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

resources:
  limits:
    cpus: "2.00"
    memory: 4G
  reservations:
    cpus: "0.25"
    memory: 1G
